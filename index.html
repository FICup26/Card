<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fanta Card Pro 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFFFFF; color: white; font-family: sans-serif; }
        
        /* CARD DESIGN - KEAN STYLE */
        .card-container {
            width: 320px;
            height: 460px;
            background: radial-gradient(circle at 50% 35%, #22d3ee 0%, #0ea5e9 45%, #1e40af 100%);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        .event-banner {
            position: absolute;
            top: 30px;
            left: -15px;
            background: #4ade80;
            padding: 8px 30px;
            transform: rotate(-5deg);
            z-index: 40;
        }

        .event-text { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1.5rem; color: white; text-transform: uppercase; }

        .bonus-value {
            position: absolute;
            top: 10px;
            right: 15px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 5.5rem;
            color: white;
            z-index: 30;
            line-height: 0.8;
            letter-spacing: -4px;
        }

        .image-area {
            position: absolute;
            bottom: 110px;
            width: 100%;
            height: 60%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 20;
        }

        .player-img { max-height: 100%; max-width: 125%; object-fit: contain; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.5)); }

        .name-footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 125px;
            background: #001a4d;
            z-index: 50;
        }

     .white-slant {
    position: absolute;
    top: 0;
    right: 0;
    width: 85%;
    height: 65px;
    background: white;
    transform: skewX(-20deg) translateX(20px);
    display: flex;
    align-items: center;
    justify-content: center;
    /* FIX FONDAMENTALE */
    overflow: hidden; 
    padding-left: 20px; 
}

#player-name {
    font-family: 'Montserrat', sans-serif;
    color: #001a4d;
    font-weight: 900;
    font-size: 1.8rem;
    font-style: italic;
    transform: skewX(20deg);
    text-transform: uppercase;
    white-space: nowrap;
    /* FIX PER NOMI LUNGHI */
    display: block;
    max-width: 85%; /* Impedisce al testo di toccare il bordo blu a destra */
    text-align: center;
}



        .team-info {
            position: absolute;
            bottom: 15px;
            right: 25px;
            color: white;
            font-weight: 900;
            font-size: 1.5rem;
            text-transform: uppercase;
            font-family: 'Montserrat', sans-serif;
        }

     .badge-left { 
        position: absolute; 
        bottom: 70px; /* Alzato per allinearsi alla barra bianca del nome */
        left: 10px;   /* Spostato vicino al bordo sinistro */
        z-index: 60;  /* Sopra tutto */
    }

    /* Il cerchio bianco intorno al logo */
    .logo-circle {
        width: 45px;
        height: 45px;
        background: white;
        border-radius: 50%; /* Lo rende un cerchio perfetto */
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        overflow: hidden; /* Taglia l'immagine se esce dal cerchio */
        border: 2px solid #001a4d; /* Un piccolo bordo blu per staccare dallo sfondo */
    }

    /* Il logo della squadra dentro il cerchio */
    .logo-small { 
        height: 80%; /* Occupa l'80% del cerchio bianco */
        width: 80%;
        object-fit: contain; 
    }

    /* Rimuoviamo il vecchio logo Serie A se non lo vuoi più */
    .badge-serie-a { display: none; }
    
    .logo-top { 
    position: absolute; 
    top: 1px;      /* Distanza dal bordo superiore */
    left: 5px;     /* Distanza dal bordo sinistro */
    z-index: 100;   /* Sopra a tutto, anche al banner dei gol */
}

.logo-ficup { 
    height: 30px;   /* Dimensione del logo */
    width: auto;
    object-fit: contain;
    /* Opzionale: aggiunge un leggero bagliore per farlo leggere meglio */
    filter: drop-shadow(0 2px 4px rgba(255,255,255,0.2)); 
}

/* Contenitore del logo Panini fatto in CSS */
.panini-logo-css {
    position: absolute;
    top: 20px;
    right: 15px;
    display: none; /* Appare solo al click */
    flex-direction: column;
    align-items: center;
    z-index: 60;
    transform: rotate(2deg); /* Leggera inclinazione dinamica */
}

/* La parte superiore Gialla */
.panini-top {
    background: #ffcc00;
    padding: 2px 15px;
    border: 2px solid #000;
    font-family: 'Arial Black', sans-serif;
    color: #e2001a; /* Rosso Panini */
    font-size: 1.4rem;
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1;
    box-shadow: 0 4px 0px rgba(0,0,0,0.2);
}

/* La targhetta nera inferiore */
.panini-bottom {
    background: #000;
    color: white;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.55rem;
    padding: 3px 8px;
    text-transform: uppercase;
    font-weight: 900;
    margin-top: -2px; /* Unisce i due pezzi */
    width: 100%;
    text-align: center;
    letter-spacing: 0.5px;
}
/* Stile per l'immagine che sostituisce il +3 */
#panini-stat-img {
    position: absolute;
    top: 5px;       /* Regola per alzare/abbassare */
    right: 5px;     /* Regola per spostare a destra/sinistra */
    width: 80px;   /* Larghezza dell'immagine */
    height: auto;
    z-index: 100;
    display: none;  /* Inizialmente nascosta */
    filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
}
/* Sfondo Oro per Player of the Match */
.card-gold {
    background: radial-gradient(circle at 50% 35%, #fef3c7 0%, #fbbf24 45%, #b45309 100%) !important;
    box-shadow: 0 0 30px rgba(251, 191, 36, 0.6) !important;
}

/* Effetto sbrilluccichio opzionale */
.card-gold::after {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(45deg, transparent 45%, rgba(255,255,255,0.3) 50%, transparent 55%);
    background-size: 200% 200%;
    animation: shine 3s infinite;
}

@keyframes shine {
    0% { background-position: -200% -200%; }
    100% { background-position: 200% 200%; }
}
/* Sconsigliato - Rosso Intenso */
.card-red {
    background: radial-gradient(circle at 50% 35%, #fca5a5 0%, #ef4444 45%, #7f1d1d 100%) !important;
}

/* Consigliato - Verde Brillante */
.card-green {
    background: radial-gradient(circle at 50% 35%, #86efac 0%, #22c55e 45%, #14532d 100%) !important;
}

/* Clean Sheet / Segna - Blu Notte o Viola/Fucsia (Suggerito per le percentuali) */
.card-stats {
    background: radial-gradient(circle at 50% 35%, #c084fc 0%, #9333ea 45%, #4c1d95 100%) !important;
}

/* Rimpicciolisce il testo della percentuale se necessario */
.percent-text {
    font-size: 4rem !important;
}
/* Per OK e NO */
.text-medium {
    font-size: 2.5rem !important; /* Molto più piccolo del 5.5rem originale */
    top: 25px !important;        /* Lo abbassa un po' per centrarlo nel cerchio */
    letter-spacing: -2px !important;
}
/* Card OUT (Arancio) */
.card-orange {
    background: radial-gradient(circle at 50% 35%, #fb923c 0%, #f97316 45%, #9a3412 100%) !important;
}


/* Icona per Indisponibile (Croce medica) */
.out-icon {
    font-size: 4rem !important;
    top: 20px !important;
}

/* Card Gol Subito (Grigio Scuro/Ferro) */
.card-dark {
    background: radial-gradient(circle at 50% 35%, #94a3b8 0%, #475569 45%, #1e293b 100%) !important;
}

/* Card INDISPONIBILE - Solo quando attiva */
.card-container.card-out-white {
    background: radial-gradient(circle at 50% 35%, #ffffff 0%, #fee2e2 45%, #ef4444 100%) !important;
}
.card-out-white #stat-val { color: #dc2626 !important; }

/* Icona Cartellino per Squalificato */
.red-card-icon {
    width: 48px;
    height: 68px;
    background: #ef4444;
    border-radius: 4px;
    border: 2px solid #000;
    display: inline-block;
    margin-top: 15px;
}

/* Fix per S.V. e scritte grandi */
.text-shrink { font-size: 3.5rem !important; top: 35px !important; }

/* Classe per rimpicciolire i testi lunghi (% e SV) */
.text-small-bonus {
    font-size: 2.5rem !important;
    top: 35px !important;
    letter-spacing: -2px !important;
}
/* Effetto Legend Super Metal (Oro e Bronzo) */
.card-legend {
    background: linear-gradient(135deg, #744d22 0%, #bf953f 25%, #fcf6ba 50%, #b38728 75%, #4e3519 100%) !important;
    box-shadow: 0 0 40px rgba(184, 134, 11, 0.7), inset 0 0 30px rgba(0,0,0,0.3) !important;
    border: 2px solid #fcf6ba !important;
}

/* Animazione Riflesso */
.card-legend::after {
    content: '';
    position: absolute;
    top: -100%; left: -100%; width: 300%; height: 300%;
    background: linear-gradient(45deg, transparent 45%, rgba(255,255,255,0.4) 50%, transparent 55%);
    animation: shine-ultra 4s infinite;
}

@keyframes shine-ultra {
    0% { transform: translate(-30%, -30%); }
    100% { transform: translate(30%, 30%); }
}

/* Scritta Legend per il Valore */
.legend-text-style {
    font-size: 2.2rem !important;
    top: 45px !important;
    right: 10px !important;
    letter-spacing: 1px !important;
    color: #4e3519 !important; /* Bronzo scuro */
    text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
    transform: rotate(-5deg);
}


    </style>
</head>

    <script>
        const SHEET_ID = '1Jc9t4NG-fF-65ijGgyFPqTkfM3UfNtIqUZVF__ILqSw';
        const teamLogos = {
            "Atalanta":"https://i.ibb.co/HLfTYZx7/Logo-Atalanta-Bergamo-svg.png",
            "Bologna":"https://i.ibb.co/jkM5SPbz/Bologna-F-C-1909-logo-svg.png",
            "Cagliari":"https://i.ibb.co/MDpds1V1/cagliari-calcio-logo-png-seeklogo-315166-3.png",
            "Como":"https://i.ibb.co/qYhwMQzH/Logo-Como-1907-2019.png",
            "Cremonese":"https://i.ibb.co/mCKdTQkH/Unione-Sportiva-Cremonese-logo-svg-1.png",
            "Fiorentina":"https://i.ibb.co/4gZ5jDc5/ACF-Fiorentina-logo-Italy-2022-svg.png",
            "Genoa":"https://i.ibb.co/Z6RcxTWw/Genoa-Cricket-and-Football-Club-logo-svg.png",
            "Inter":"https://i.ibb.co/F4C4vHjc/FC-Internazionale-Milano-2021-svg-1.png",
            "Juventus":"https://i.ibb.co/xtkRyBJp/Juventus-FC-2017-logo.png",
            "Lazio":"https://i.ibb.co/840BWT8m/Stemma-della-Societ-Sportiva-Lazio-svg.png",
            "Lecce":"https://i.ibb.co/SDQ0zy8s/US-Lecce-Stemma-svg.png",
            "Milan":"https://i.ibb.co/B2V1c6K3/Logo-of-AC-Milan-svg.png",
            "Napoli":"https://i.ibb.co/DgmL7YGb/SSC-Neapel-svg.png",
            "Parma":"https://i.ibb.co/bgMLjHdf/Logo-Parma-Calcio-1913-adozione-2016-svg.png",
            "Pisa":"https://i.ibb.co/35bNsCSV/Logo-Pisa-SC-2017-svg.png",
            "Roma":"https://i.ibb.co/rRkxM7Bf/AS-Roma-Logo-2017-svg-1.png",
            "Sassuolo":"https://i.ibb.co/Xrj8PYjx/Ussassuolostemma-svg.png",
            "Torino":"https://i.ibb.co/v62Bw8qY/Torino-FC-logo-svg.png",
            "Udinese":"https://i.ibb.co/5xhRTYmp/Logo-Udinese-Calcio-svg.png",
            "Verona":"https://i.ibb.co/k6yWJsZf/Hellas-Verona-FC-logo-2020-svg.png"
        };

        let database = [];
        const statusMsg = document.getElementById('status-msg');

        // Caricamento JSONP (Anticors)
        function init() {
            const script = document.createElement('script');
            script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:processData`;
            document.body.appendChild(script);
        }

        window.processData = function(data) {
            try {
                database = data.table.rows.map(r => ({
                    nome: r.c[0] ? String(r.c[0].v).trim() : '', 
                    squadra: r.c[1] ? String(r.c[1].v).trim() : '', 
                    foto: r.c[3] ? String(r.c[3].v).trim() : ''
                })).filter(p => p.nome.length > 1);
                
                statusMsg.innerText = `✅ Database Online: ${database.length} Calciatori`;
                statusMsg.style.color = "#4ade80";
            } catch (e) {
                statusMsg.innerText = "❌ Errore Caricamento Dati";
            }
        };

        // Gestione Ricerca
        const searchInput = document.getElementById('searchInput');
        const resultsBox = document.getElementById('results');

        searchInput.addEventListener('input', () => {
            const val = searchInput.value.toLowerCase().trim();
            resultsBox.innerHTML = '';
            if (val.length < 2) return resultsBox.classList.add('hidden');

            const matches = database.filter(p => p.nome.toLowerCase().includes(val)).slice(0, 8);
            if (matches.length > 0) {
                resultsBox.classList.remove('hidden');
                matches.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'search-item';
                    div.innerHTML = `<strong>${p.nome}</strong> <small>(${p.squadra})</small>`;
                    div.onclick = () => {
    const nameEl = document.getElementById('player-name');
    const tLogo = document.getElementById('team-logo');
    const imgEl = document.getElementById('main-img');
    const fallback = document.getElementById('img-fallback');
    
    // 1. GESTIONE NOME E AUTO-RESIZE
    let nomeCompleto = p.nome.toUpperCase().trim();
    nameEl.innerText = nomeCompleto;

    // Reset spaziatura per sicurezza
    nameEl.style.letterSpacing = "0px";

    // Logica di ridimensionamento migliorata per Bernardeschi
    if (nomeCompleto.length > 16) {
        nameEl.style.fontSize = "1.0rem"; // Nomi lunghissimi (es. Papastathopoulos)
    } else if (nomeCompleto.length > 12) {
        nameEl.style.fontSize = "1.25rem"; // Bernardeschi ora entra perfettamente
    } else if (nomeCompleto.length > 9) {
        nameEl.style.fontSize = "1.5rem";  // Nomi medi (es. Provedel)
    } else {
        nameEl.style.fontSize = "1.8rem";  // Nomi corti (es. Kean)
        nameEl.style.letterSpacing = "1px"; // Un tocco di stile per i nomi corti
    }

    // 2. AGGIORNA SQUADRA (Sotto il nome)
    document.getElementById('team-name').innerText = p.squadra;

    // 3. GESTIONE LOGO SQUADRA (Case-Insensitive per Torino/Lecce)
    const nomeSquadraFogli = p.squadra.trim();
    const logoChiave = Object.keys(teamLogos).find(k => k.toLowerCase() === nomeSquadraFogli.toLowerCase());

    if (logoChiave) {
        tLogo.src = teamLogos[logoChiave];
        tLogo.style.display = 'block';
    } else {
        tLogo.style.display = 'none';
    }

    // 4. GESTIONE FOTO
    if(p.foto && p.foto.startsWith('http')) {
        imgEl.src = p.foto;
        imgEl.style.display = 'block';
        fallback.style.display = 'none';
    } else {
        imgEl.style.display = 'none';
        fallback.style.display = 'block';
    }
    
    resultsBox.classList.add('hidden');
    document.getElementById('searchInput').value = '';
};


                    resultsBox.appendChild(div);
                });
            }
        });

        
        
     // Carica la libreria per trasformare HTML in immagine
const scriptCanvas = document.createElement('script');
scriptCanvas.src = "https://html2canvas.hertzen.com/dist/html2canvas.min.js";
document.head.appendChild(scriptCanvas);

function activateMOTM() {
    const card = document.getElementById('card');
    const valEl = document.getElementById('stat-val');
    const labelEl = document.getElementById('event-label');
    const bannerEl = document.getElementById('banner-bg');
    const paniniImg = document.getElementById('panini-stat-img');

    // Reset classi e applicazione Oro
    card.classList.remove('card-red', 'card-green', 'card-stats', 'card-orange', 'card-dark');
    card.classList.add('card-gold');

    valEl.style.display = 'none'; // Nasconde il +3
    paniniImg.style.display = 'block'; // Mostra il logo Panini
    
    labelEl.innerText = "PLAYER OF THE MATCH";
    labelEl.style.fontSize = "0.9rem"; // Font più piccolo per far stare la scritta nel banner
    bannerEl.style.background = "#000000"; 
}


function updateStats(val, label, color, specialClass = null) {
    const card = document.getElementById('card');
    const valEl = document.getElementById('stat-val');
    const labelEl = document.getElementById('event-label');
    const bannerEl = document.getElementById('banner-bg');
    const paniniImg = document.getElementById('panini-stat-img');

    // 1. RESET TOTALE
    card.className = "card-container"; 
    if(specialClass) card.classList.add(specialClass);
    
    valEl.className = "bonus-value"; 
    valEl.style.color = "white"; 
    valEl.innerHTML = val; 
    
    // RESET DIMENSIONI (Fondamentale per pulire i residui di % o SV)
    valEl.style.fontSize = "5.5rem"; 
    valEl.style.top = "10px";
    valEl.style.letterSpacing = "-4px";
    
    paniniImg.style.display = 'none';
    valEl.style.display = 'block';
    
    // 2. APPLICA NUOVI DATI
    labelEl.innerText = label;
    labelEl.style.fontSize = "1.5rem"; // Reset dimensione font banner
    labelEl.style.color = (specialClass === 'card-top') ? "#001a4d" : "white";
    bannerEl.style.background = color;
}


function setOutStatus() {

}

function setSqualificato() {

}

function setSenzaVoto() {
    updateStats('S.V.', 'SENZA VOTO', '#64748b');

}



async function downloadCard() {
    const el = document.getElementById('card'); // Prende la tua card
    const btn = event.target;
    const originalText = btn.innerText;
    
    btn.innerText = "ELABORAZIONE...";
    
    // Aspetta che i font siano caricati per evitare scritte sballate
    await document.fonts.ready;

    html2canvas(el, {
        scale: 3,           // Alta risoluzione
        useCORS: true,      // Permette di scaricare loghi da internet
        backgroundColor: null,
        onclone: (clonedDoc) => {
            // FIX PROPORZIONI LOGHI (Metodo Serie A Out)
            // Cerchiamo il cerchio bianco nella copia temporanea
            const containers = clonedDoc.querySelectorAll('.logo-circle');
            containers.forEach(c => {
                c.style.width = '45px';
                c.style.height = '45px';
                c.style.display = 'flex';
                c.style.alignItems = 'center';
                c.style.justifyContent = 'center';
                c.style.overflow = 'hidden';
            });

            // Forziamo il logo a restare proporzionato
            const imgs = clonedDoc.querySelectorAll('.logo-small');
            imgs.forEach(i => {
                i.style.width = 'auto'; 
                i.style.height = 'auto';
                i.style.maxWidth = '80%'; // Non tocca i bordi del cerchio
                i.style.maxHeight = '80%';
                i.style.objectFit = 'contain';
                i.style.display = 'block';
            });
            
            // Fix opzionale per il logo FICUP in alto
            const ficupLogo = clonedDoc.querySelector('.logo-ficup');
            if(ficupLogo) {
                ficupLogo.style.height = '30px';
                ficupLogo.style.width = 'auto';
            }
        }
    }).then(canvas => {
        const link = document.createElement('a');
        const nomeCalciatore = document.getElementById('player-name').innerText;
        link.download = `FantaCard_${nomeCalciatore}.png`;
        link.href = canvas.toDataURL("image/png", 1.0);
        link.click();
        btn.innerText = originalText;
    }).catch(err => {
        console.error("Errore nel salvataggio:", err);
        btn.innerText = "ERRORE";
    });
}
// Funzione per Consigliato/Sconsigliato
function setCardStatus(label, cardClass) {
    const card = document.getElementById('card');
    const valEl = document.getElementById('stat-val');
    const labelEl = document.getElementById('event-label');
    const bannerEl = document.getElementById('banner-bg');
    const paniniImg = document.getElementById('panini-stat-img');

    // Reset totale di tutte le classi e dimensioni precedenti
    card.classList.remove('card-gold', 'card-red', 'card-green', 'card-stats');
    valEl.classList.remove('text-medium', 'percent-text');
    
    paniniImg.style.display = 'none';
    valEl.style.display = 'block';

    card.classList.add(cardClass);
    
    // Gestione testo e applicazione dimensione ridotta
    if(label === 'SCONSIGLIATO') {
        valEl.innerText = "NO";
    } else {
        valEl.innerText = "OK";
    }
    valEl.classList.add('text-medium'); // APPLICA IL FONT PICCOLO
    
    labelEl.innerText = label;
    labelEl.style.fontSize = "1.5rem";
    bannerEl.style.background = "rgba(0,0,0,0.5)"; 
}
// Funzione Fondamentale per pulire la card prima di ogni cambio
function fullReset() {
    const card = document.getElementById('card');
    const valEl = document.getElementById('stat-val');
    const labelEl = document.getElementById('event-label');
    const bannerEl = document.getElementById('banner-bg');
    const paniniImg = document.getElementById('panini-stat-img');

    // Reset Classi
    card.className = "card-container";
    
    // Reset Valore
    valEl.style = ""; // Pulisce tutti gli stili inline (fontSize, colori, ecc)
    valEl.className = "bonus-value";
    valEl.style.display = "block";
    valEl.innerHTML = "";

    // Reset Banner
    labelEl.style = "";
    labelEl.className = "event-text";
    
    // Nascondi Panini se attivo
    paniniImg.style.display = 'none';
}

function setLegend() {
    fullReset(); // Pulisce tutto
    const card = document.getElementById('card');
    const valEl = document.getElementById('stat-val');
    const labelEl = document.getElementById('event-label');
    const bannerEl = document.getElementById('banner-bg');

    card.classList.add('card-legend');
    
    // Inseriamo il testo LEGEND al posto del numero
    valEl.innerText = "";
    valEl.classList.add('legend-text-style');
    
    // Banner coordinato
    labelEl.innerText = "LEGEND";
    labelEl.style.fontSize = "1rem";
    bannerEl.style.background = "#4e3519"; // Fondo bronzo scuro
}

// Aggiorna anche updateStats per usare il reset
function updateStats(val, label, color, specialClass = null) {
    fullReset();
    const card = document.getElementById('card');
    const valEl = document.getElementById('stat-val');
    const labelEl = document.getElementById('event-label');
    const bannerEl = document.getElementById('banner-bg');

    if(specialClass) card.classList.add(specialClass);
    
    valEl.innerText = val;
    labelEl.innerText = label;
    bannerEl.style.background = color;

    // Fix dimensioni per casi speciali
    if(val.includes('%') || val === 'S.V.') {
        valEl.style.fontSize = "3rem";
        valEl.style.top = "35px";
    }
}


// Funzione per le Percentuali (Clean Sheet / Segna)
function setPercentage(type) {
    const percent = prompt("Inserisci la percentuale (solo numero):", "50");
    if (percent === null || percent === "") return;

    const card = document.getElementById('card');
    const valEl = document.getElementById('stat-val');
    const labelEl = document.getElementById('event-label');
    const bannerEl = document.getElementById('banner-bg');
    const paniniImg = document.getElementById('panini-stat-img');

    // Reset classi e applica sfondo viola
    card.classList.remove('card-gold', 'card-red', 'card-green', 'card-orange', 'card-dark', 'card-out-white');
    card.classList.add('card-stats');
    
    paniniImg.style.display = 'none';
    valEl.style.display = 'block';
    
    // FISSA DIMENSIONE: Qui forziamo il testo piccolo
    valEl.innerText = percent + "%";
    valEl.style.fontSize = "2.5rem"; // <--- FORZA DIMENSIONE PICCOLA
    valEl.style.top = "30px";        // <--- LO ABBASSA PER NON TOCCARE IL BANNER
    
    labelEl.innerText = type;
    labelEl.style.fontSize = "1.3rem";
    bannerEl.style.background = "#000";
}

function setVotoSpeciale(label, cardClass, bannerColor) {
    const voto = prompt("Inserisci il voto per " + label + ":", "4");
    if (voto === null || voto === "") return;
    
    // Usa la funzione updateStats che abbiamo già corretto per applicare tutto
    updateStats(voto, label, bannerColor, cardClass);
}
