<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fanta Card Pro 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFFFFF; color: white; font-family: sans-serif; }
        
        /* CARD DESIGN - KEAN STYLE */
        .card-container {
            width: 320px;
            height: 460px;
            background: radial-gradient(circle at 50% 35%, #22d3ee 0%, #0ea5e9 45%, #1e40af 100%);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        .event-banner {
            position: absolute;
            top: 30px;
            left: -15px;
            background: #4ade80;
            padding: 8px 30px;
            transform: rotate(-5deg);
            z-index: 40;
        }

        .event-text { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1.5rem; color: white; text-transform: uppercase; }

        .bonus-value {
            position: absolute;
            top: 10px;
            right: 15px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 5.5rem;
            color: white;
            z-index: 30;
            line-height: 0.8;
            letter-spacing: -4px;
        }

        .image-area {
            position: absolute;
            bottom: 110px;
            width: 100%;
            height: 60%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 20;
        }

        .player-img { max-height: 100%; max-width: 125%; object-fit: contain; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.5)); }

        .name-footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 125px;
            background: #001a4d;
            z-index: 50;
        }

     .white-slant {
    position: absolute;
    top: 0;
    right: 0;
    width: 85%;
    height: 65px;
    background: white;
    transform: skewX(-20deg) translateX(20px);
    display: flex;
    align-items: center;
    justify-content: center;
    /* FIX FONDAMENTALE */
    overflow: hidden; 
    padding-left: 20px; 
}

#player-name {
    font-family: 'Montserrat', sans-serif;
    color: #001a4d;
    font-weight: 900;
    font-size: 1.8rem;
    font-style: italic;
    transform: skewX(20deg);
    text-transform: uppercase;
    white-space: nowrap;
    /* FIX PER NOMI LUNGHI */
    display: block;
    max-width: 85%; /* Impedisce al testo di toccare il bordo blu a destra */
    text-align: center;
}



        .team-info {
            position: absolute;
            bottom: 15px;
            right: 25px;
            color: white;
            font-weight: 900;
            font-size: 1.5rem;
            text-transform: uppercase;
            font-family: 'Montserrat', sans-serif;
        }

     .badge-left { 
        position: absolute; 
        bottom: 70px; /* Alzato per allinearsi alla barra bianca del nome */
        left: 10px;   /* Spostato vicino al bordo sinistro */
        z-index: 60;  /* Sopra tutto */
    }

    /* Il cerchio bianco intorno al logo */
    .logo-circle {
        width: 45px;
        height: 45px;
        background: white;
        border-radius: 50%; /* Lo rende un cerchio perfetto */
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        overflow: hidden; /* Taglia l'immagine se esce dal cerchio */
        border: 2px solid #001a4d; /* Un piccolo bordo blu per staccare dallo sfondo */
    }

    /* Il logo della squadra dentro il cerchio */
    .logo-small { 
        height: 80%; /* Occupa l'80% del cerchio bianco */
        width: 80%;
        object-fit: contain; 
    }

    /* Rimuoviamo il vecchio logo Serie A se non lo vuoi più */
    .badge-serie-a { display: none; }
    
    .logo-top { 
    position: absolute; 
    top: 1px;      /* Distanza dal bordo superiore */
    left: 5px;     /* Distanza dal bordo sinistro */
    z-index: 100;   /* Sopra a tutto, anche al banner dei gol */
}

.logo-ficup { 
    height: 30px;   /* Dimensione del logo */
    width: auto;
    object-fit: contain;
    /* Opzionale: aggiunge un leggero bagliore per farlo leggere meglio */
    filter: drop-shadow(0 2px 4px rgba(255,255,255,0.2)); 
}

/* Contenitore del logo Panini fatto in CSS */
.panini-logo-css {
    position: absolute;
    top: 20px;
    right: 15px;
    display: none; /* Appare solo al click */
    flex-direction: column;
    align-items: center;
    z-index: 60;
    transform: rotate(2deg); /* Leggera inclinazione dinamica */
}

/* La parte superiore Gialla */
.panini-top {
    background: #ffcc00;
    padding: 2px 15px;
    border: 2px solid #000;
    font-family: 'Arial Black', sans-serif;
    color: #e2001a; /* Rosso Panini */
    font-size: 1.4rem;
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1;
    box-shadow: 0 4px 0px rgba(0,0,0,0.2);
}

/* La targhetta nera inferiore */
.panini-bottom {
    background: #000;
    color: white;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.55rem;
    padding: 3px 8px;
    text-transform: uppercase;
    font-weight: 900;
    margin-top: -2px; /* Unisce i due pezzi */
    width: 100%;
    text-align: center;
    letter-spacing: 0.5px;
}
/* Stile per l'immagine che sostituisce il +3 */
#panini-stat-img {
    position: absolute;
    top: 5px;       /* Regola per alzare/abbassare */
    right: 5px;     /* Regola per spostare a destra/sinistra */
    width: 80px;   /* Larghezza dell'immagine */
    height: auto;
    z-index: 100;
    display: none;  /* Inizialmente nascosta */
    filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
}
/* Sfondo Oro per Player of the Match */
.card-gold {
    background: radial-gradient(circle at 50% 35%, #fef3c7 0%, #fbbf24 45%, #b45309 100%) !important;
    box-shadow: 0 0 30px rgba(251, 191, 36, 0.6) !important;
}

/* Effetto sbrilluccichio opzionale */
.card-gold::after {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(45deg, transparent 45%, rgba(255,255,255,0.3) 50%, transparent 55%);
    background-size: 200% 200%;
    animation: shine 3s infinite;
}

@keyframes shine {
    0% { background-position: -200% -200%; }
    100% { background-position: 200% 200%; }
}
/* Sconsigliato - Rosso Intenso */
.card-red {
    background: radial-gradient(circle at 50% 35%, #fca5a5 0%, #ef4444 45%, #7f1d1d 100%) !important;
}

/* Consigliato - Verde Brillante */
.card-green {
    background: radial-gradient(circle at 50% 35%, #86efac 0%, #22c55e 45%, #14532d 100%) !important;
}

/* Clean Sheet / Segna - Blu Notte o Viola/Fucsia (Suggerito per le percentuali) */
.card-stats {
    background: radial-gradient(circle at 50% 35%, #c084fc 0%, #9333ea 45%, #4c1d95 100%) !important;
}

/* Rimpicciolisce il testo della percentuale se necessario */
.percent-text {
    font-size: 4rem !important;
}
/* Per OK e NO */
.text-medium {
    font-size: 2.5rem !important; /* Molto più piccolo del 5.5rem originale */
    top: 25px !important;        /* Lo abbassa un po' per centrarlo nel cerchio */
    letter-spacing: -2px !important;
}
/* Card OUT (Arancio) */
.card-orange {
    background: radial-gradient(circle at 50% 35%, #fb923c 0%, #f97316 45%, #9a3412 100%) !important;
}


/* Icona per Indisponibile (Croce medica) */
.out-icon {
    font-size: 4rem !important;
    top: 20px !important;
}

/* Card Gol Subito (Grigio Scuro/Ferro) */
.card-dark {
    background: radial-gradient(circle at 50% 35%, #94a3b8 0%, #475569 45%, #1e293b 100%) !important;
}

/* Card INDISPONIBILE - Solo quando attiva */
.card-container.card-out-white {
    background: radial-gradient(circle at 50% 35%, #ffffff 0%, #fee2e2 45%, #ef4444 100%) !important;
}
.card-out-white #stat-val { color: #dc2626 !important; }

/* Icona Cartellino per Squalificato */
.red-card-icon {
    width: 48px;
    height: 68px;
    background: #ef4444;
    border-radius: 4px;
    border: 2px solid #000;
    display: inline-block;
    margin-top: 15px;
}

/* Fix per S.V. e scritte grandi */
.text-shrink { font-size: 3.5rem !important; top: 35px !important; }

/* Classe per rimpicciolire i testi lunghi (% e SV) */
.text-small-bonus {
    font-size: 2.5rem !important;
    top: 35px !important;
    letter-spacing: -2px !important;
}
/* Effetto Legend Super Metal (Oro e Bronzo) */
.card-legend {
    background: linear-gradient(135deg, #744d22 0%, #bf953f 25%, #fcf6ba 50%, #b38728 75%, #4e3519 100%) !important;
    box-shadow: 0 0 40px rgba(184, 134, 11, 0.7), inset 0 0 30px rgba(0,0,0,0.3) !important;
    border: 2px solid #fcf6ba !important;
}

/* Animazione Riflesso */
.card-legend::after {
    content: '';
    position: absolute;
    top: -100%; left: -100%; width: 300%; height: 300%;
    background: linear-gradient(45deg, transparent 45%, rgba(255,255,255,0.4) 50%, transparent 55%);
    animation: shine-ultra 4s infinite;
}

@keyframes shine-ultra {
    0% { transform: translate(-30%, -30%); }
    100% { transform: translate(30%, 30%); }
}

/* Scritta Legend per il Valore */
.legend-text-style {
    font-size: 2.2rem !important;
    top: 45px !important;
    right: 10px !important;
    letter-spacing: 1px !important;
    color: #4e3519 !important; /* Bronzo scuro */
    text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
    transform: rotate(-5deg);
}

/* Card Base 320x460 */
.match-card-seriea {
    width: 320px;
    height: 460px;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    background: #111;
}

/* Sfondo Diviso Netto */
.split-background {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex;
    z-index: 1;
}
/* Contenitore sfondi */
.split-background {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex;
    z-index: 1;
    background: #000;
}

/* Lato Casa con Taglio a Fulmine/Zig-Zag */
#bgH {
    flex: 1.2; /* Leggermente più largo per gestire le punte */
    position: relative;
    z-index: 2;
    /* Crea 3 punte a zig-zag */
    clip-path: polygon(0% 0%, 100% 0%, 85% 33%, 100% 66%, 85% 100%, 0% 100%);
    box-shadow: inset -20px 0 50px rgba(0,0,0,0.5);
}

/* Effetto Luce sul bordo dello Zig-Zag */
#bgH::after {
    content: "";
    position: absolute;
    top: 0; right: 0;
    width: 100%; height: 100%;
    /* Segue esattamente la sagoma del clip-path sopra */
    clip-path: polygon(100% 0%, 98% 0%, 83% 33%, 98% 66%, 83% 100%, 85% 100%, 100% 66%, 85% 33%);
    background: rgba(255, 255, 255, 0.5);
    filter: blur(2px);
    pointer-events: none;
}

/* Lato Trasferta (si incastra sotto) */
#bgA {
    flex: 1;
    margin-left: -20%; /* Fondamentale per far sparire il nero sotto le punte */
    z-index: 1;
}


/* Scoreboard Centrale Orizzontale */
.scoreboard-center {
    position: relative;
    z-index: 10;
    margin-top: auto;
    margin-bottom: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    width: 100%;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(10px);
    padding: 30px 0;
    border-top: 2px solid white;
    border-bottom: 2px solid white;
}

.team-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 80px;
}

.logo-main {
    width: 70px;
    height: 70px;
    object-fit: contain;
    filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
}

.score-number {
    font-family: 'Montserrat', sans-serif;
    font-size: 4.5rem;
    font-weight: 900;
    color: white;
    line-height: 1;
}

/* Fascia Testi Premium (Stile Sky Sport) */
.strip-info-white {
    position: absolute;
    bottom: 35px;
    width: 110%; /* Più larga per uscire dai bordi */
    left: -5%;   /* Centrata rispetto alla larghezza 110% */
    background: white;
    padding: 12px 0;
    text-align: center;
    z-index: 20;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    
    /* Taglio obliquo moderno */
    transform: rotate(-2deg); 
    display: none; /* Attivabile da pulsante */
    border-top: 4px solid #00f2ff; /* Linea di accento azzurro neon */
}

/* Sottostriscia per creare profondità */
.strip-info-white::before {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,0,0,0.05), transparent);
}

.strip-info-white span {
    color: #001a4d;
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    text-transform: uppercase;
    font-size: 0.9rem;
    letter-spacing: 2px;
    display: block;
    transform: rotate(2deg); /* Raddrizza il testo rispetto alla striscia storta */
    text-shadow: 1px 1px 0px rgba(0,0,0,0.1);
}

/* Stacco superiore per la console */
.console-container {
    margin-top: 50px;
    margin-bottom: 40px;
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
}

/* Logo FICUP - Forza la visibilità */
.ficup-logo-top {
    position: absolute;
    top: 15px;
    width: 100%;
    text-align: center;
    z-index: 99; /* Massimo livello */
}

/* Titoli Match Day */
.header-titles {
    position: absolute;
    top: 70px;
    width: 100%;
    text-align: center;
    z-index: 20;
}

.title-main {
    color: white;
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 1.9rem;
    text-transform: uppercase;
    display: block;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}

.title-sub {
    color: rgba(255,255,255,0.9);
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 1.rem;
    text-transform: uppercase;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
}
/* Cerchio Bianco Sotto i Loghi */
.logo-circle-match {
    width: 80px;
    height: 80px;
    background: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    /* Doppio bordo: uno scuro e uno di luce */
    border: 3px solid rgba(255,255,255,0.2);
    outline: 2px solid rgba(0,0,0,0.3);
    box-shadow: 0 10px 20px rgba(0,0,0,0.4), inset 0 0 15px rgba(0,0,0,0.1);
    margin: 0 auto;
    position: relative;
    z-index: 5;
}


/* Logo dentro il cerchio */
.logo-main {
    width: 75%;           /* Il logo occupa il 75% del cerchio bianco */
    height: 75%;
    object-fit: contain;
}
.logo-main {
    width: 75%;
    height: 75%;
    object-fit: contain;
    /* Effetto profondità logo */
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
}

.scoreboard-center {
    background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(20,20,20,0.6) 100%);
    backdrop-filter: blur(15px);
    border-top: 1px solid rgba(255,255,255,0.3);
    border-bottom: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    /* Taglio leggermente obliquo alle estremità */
    clip-path: polygon(0% 10%, 100% 0%, 100% 90%, 0% 100%);
}

/6 Effetto grana/texture sopra i colori */
.split-background div {
    position: relative;
    overflow: hidden;
}

.split-background div::after {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
    opacity: 0.15; /* Leggerissima texture fibra di carbonio */
    pointer-events: none;
}

/* Sfumatura interna per dare volume */
.side-home, .side-away {
    box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
}


    </style>
</head>

                    squadra: r.c[1] ? String(r.c[1].v).trim() : '',

    } else if (nomeCompleto.length > 12) {
        nameEl.style.fontSize = "1.25rem"; // Bernardeschi ora entra perfettamente
    } else if (nomeCompleto.length > 9) {
        nameEl.style.fontSize = "1.5rem";  // Nomi medi (es. Provedel)

        nameEl.style.fontSize = "1.8rem";  // Nomi corti (es. Kean)

        tLogo.style.display = 'block';

        fallback.style.display = 'none';

async function downloadCard() {
    const el = document.getElementById('card'); // Prende la tua card
    const btn = event.target;
    const originalText = btn.innerText;
    
    btn.innerText = "ELABORAZIONE...";
    
    // Aspetta che i font siano caricati per evitare scritte sballate
    await document.fonts.ready;

    html2canvas(el, {
        scale: 3,           // Alta risoluzione
        useCORS: true,      // Permette di scaricare loghi da internet
        backgroundColor: null,
        onclone: (clonedDoc) => {
            // FIX PROPORZIONI LOGHI (Metodo Serie A Out)
            // Cerchiamo il cerchio bianco nella copia temporanea
            const containers = clonedDoc.querySelectorAll('.logo-circle');
            containers.forEach(c => {
                c.style.width = '45px';
                c.style.height = '45px';
                c.style.display = 'flex';
                c.style.alignItems = 'center';
                c.style.justifyContent = 'center';
                c.style.overflow = 'hidden';
            });

            // Forziamo il logo a restare proporzionato
            const imgs = clonedDoc.querySelectorAll('.logo-small');
            imgs.forEach(i => {
                i.style.width = 'auto'; 
                i.style.height = 'auto';
                i.style.maxWidth = '80%'; // Non tocca i bordi del cerchio
                i.style.maxHeight = '80%';
                i.style.objectFit = 'contain';
                i.style.display = 'block';
            });
            
            // Fix opzionale per il logo FICUP in alto
            const ficupLogo = clonedDoc.querySelector('.logo-ficup');
            if(ficupLogo) {
                ficupLogo.style.height = '30px';
                ficupLogo.style.width = 'auto';
            }
        }
    }).then(canvas => {
        const link = document.createElement('a');
        const nomeCalciatore = document.getElementById('player-name').innerText;
        link.download = `FantaCard_${nomeCalciatore}.png`;
        link.href = canvas.toDataURL("image/png", 1.0);
        link.click();
        btn.innerText = originalText;
    }).catch(err => {
        console.error("Errore nel salvataggio:", err);
        btn.innerText = "ERRORE";
    });
}

// Funzione per le Percentuali (Clean Sheet / Segna)
function setPercentage(type) {
    const percent = prompt("Inserisci la percentuale (solo numero):", "50");
    if (percent === null || percent === "") return;

    const card = document.getElementById('card');
    const valEl = document.getElementById('stat-val');
    const labelEl = document.getElementById('event-label');
    const bannerEl = document.getElementById('banner-bg');
    const paniniImg = document.getElementById('panini-stat-img');

    // Reset classi e applica sfondo viola
    card.classList.remove('card-gold', 'card-red', 'card-green', 'card-orange', 'card-dark', 'card-out-white');
    card.classList.add('card-stats');
    
    paniniImg.style.display = 'none';
    valEl.style.display = 'block';
    
    // FISSA DIMENSIONE: Qui forziamo il testo piccolo
    valEl.innerText = percent + "%";
    valEl.style.fontSize = "2.5rem"; // <--- FORZA DIMENSIONE PICCOLA
    valEl.style.top = "30px";        // <--- LO ABBASSA PER NON TOCCARE IL BANNER
    
    labelEl.innerText = type;
    labelEl.style.fontSize = "1.3rem";
    bannerEl.style.background = "#000";
}

// 2. FUNZIONE PRINCIPALE DI AGGIORNAMENTO
window.updateMatch = function() {
    const scoreBox = document.getElementById('scoreBox');
    if (!scoreBox) return;

    // Rileva se siamo in modalità Pronostico
    const isPred = scoreBox.classList.contains('is-prediction');
    
    // Riferimenti Input
    const h = document.getElementById('selH').value;
    const a = document.getElementById('selA').value;
    const inputTitolo = document.getElementById('inTit').value;
    const inputSottotitolo = document.getElementById('inSub').value;
    const inputBanner = document.getElementById('inBanner'); // Campo per la striscia bianca

    // AGGIORNAMENTO TITOLI (Sopra la card)
    document.getElementById('outTit').innerText = inputTitolo || "MATCH DAY";
    document.getElementById('outSub').innerText = inputSottotitolo || "GIORNATA 00";

    // AGGIORNAMENTO TESTO STRISCIA BIANCA
    const outBanner = document.getElementById('txtDisplay');
    if (inputBanner && outBanner) {
        outBanner.innerText = inputBanner.value || "FINAL RESULT";
    }

    // AGGIORNAMENTO COLORI E LOGHI (Con Gradienti Reali)
    if(h && teamColorsMatch[h]) {
        const colorData = teamColorsMatch[h];
        // Se hai usato l'oggetto con top e bottom:
        if (typeof colorData === 'object') {
            document.getElementById('bgH').style.background = `linear-gradient(180deg, ${colorData.top} 0%, ${colorData.bottom} 100%)`;
        } else {
            // Se usi ancora i colori singoli come backup
            document.getElementById('bgH').style.backgroundColor = colorData;
        }
        document.getElementById('imgH').src = teamLogos[h];
    }

    if(a && teamColorsMatch[a]) {
        const colorData = teamColorsMatch[a];
        if (typeof colorData === 'object') {
            document.getElementById('bgA').style.background = `linear-gradient(180deg, ${colorData.top} 0%, ${colorData.bottom} 100%)`;
        } else {
            document.getElementById('bgA').style.backgroundColor = colorData;
        }
        document.getElementById('imgA').src = teamLogos[a];
    }


    // VISIBILITÀ LABEL "PRONOSTICO CONSIGLIATO"
    const pLabel = document.getElementById('pLabel');
    if (pLabel) pLabel.style.display = isPred ? "block" : "none";

    // GESTIONE PUNTEGGI O PRONOSTICO
    if(isPred) {
        // Modalità Pronostico
        document.getElementById('valH').innerText = document.getElementById('singlePred').value || "1X";
        document.getElementById('valA').style.display = "none";
        document.getElementById('sep').style.display = "none";
    } else {
        // Modalità Risultato Reale
        document.getElementById('valH').innerText = document.getElementById('scH').value || "0";
        document.getElementById('valA').innerText = document.getElementById('scA').value || "0";
        document.getElementById('valA').style.display = "inline";
        document.getElementById('sep').style.display = "inline";
    }
};

// 3. FUNZIONE PER ATTIVARE/DISATTIVARE PRONOSTICO
window.togglePredictionStyle = function() {
    const sb = document.getElementById('scoreBox');
    const ig = document.getElementById('inputGara');
    const ip = document.getElementById('inputPred');
    
    if(sb && ig && ip) {
        sb.classList.toggle('is-prediction');
        ig.classList.toggle('hidden');
        ip.classList.toggle('hidden');
        updateMatch(); // Riesegue l'update per sistemare i testi
    }
};

// 4. FUNZIONE PER MOSTRARE/NASCONDERE LA STRISCIA
window.toggleBanner = function() {
    const b = document.getElementById('bannerInfo');
    if(b) {
        b.style.display = (b.style.display === 'block' || b.style.display === '') ? 'none' : 'block';
    }
};

// 5. INIZIALIZZAZIONE SQUADRE NEI SELETTORI
// Funzione Unificata di Avvio
function avvioGlobale() {
    // 1. Carica Database Calciatori (Anticors)
    const script = document.createElement('script');
    script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:processData`;
    document.body.appendChild(script);

    // 2. Popola selettori squadre Match Day
    const sH = document.getElementById('selH');
    const sA = document.getElementById('selA');
    
    if(sH && sA && typeof teamLogos !== 'undefined') {
        sH.innerHTML = '<option value="">CASA</option>';
        sA.innerHTML = '<option value="">TRASFERTA</option>';
        Object.keys(teamLogos).sort().forEach(t => {
            sH.add(new Option(t, t));
            sA.add(new Option(t, t));
        });
    }
}

// Lancia tutto al caricamento della pagina
window.onload = avvioGlobale;
